<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rosella</title>
    <link rel="stylesheet" href="main.css" />
    <link rel="stylesheet" href="details.css" />
    <script
      src="https://kit.fontawesome.com/c88c89023a.js"
      crossorigin="anonymous"
    ></script>
    <link rel="shortcut icon" href="images/nature.png" type="image/x-icon" />
  </head>
  <body>
    <main>
      <div class="container">
        <div class="flower-det">
          <div class="image">
            <img src="images/" alt="flower-photo" class="flower-photo" />
            <span class="color"> </span>
          </div>
          <div class="info">
            <span class="name"></span>
            <hr />
            <div class="line">
              <span class="def"
                ><i class="fa-brands fa-pagelines"></i> Scientific Name: </span
              ><span class="scientificName det"></span>
            </div>
            <div class="line">
              <span class="def"
                ><i class="fa-brands fa-envira"></i> Family: </span
              ><span class="family det"></span>
            </div>
            <div class="line">
              <span class="def"
                ><i class="fa-solid fa-calendar-days"></i> Bloom Season: </span
              ><span class="bloomSeason det"></span>
            </div>
            <div class="line">
              <span class="def"
                ><i class="fa-solid fa-spray-can-sparkles"></i>
                Fragrance: </span
              ><span class="fragrance det"></span>
            </div>
            <div class="line">
              <span class="def"
                ><i class="fa-solid fa-earth-americas"></i> Origin: </span
              ><span class="origin det"></span>
            </div>
          </div>
        </div>
        <div class="extra-info">
          <div class="box">
            <span class="def"
              ><i class="fa-regular fa-heart"></i> Symbolism
            </span>
            <hr />
            <span class="symbolism det"></span>
          </div>
          <div class="box">
            <span class="def"><i class="fa-solid fa-briefcase"></i> Care </span>
            <hr />
            <span class="care det"></span>
          </div>
          <div class="box">
            <span class="def"><i class="fa-solid fa-gift"></i> Uses </span>
            <hr />
            <span class="uses det"></span>
          </div>
        </div>
        <div class="shop">
          <div class="line-fin">
            <span class="bouqet-info"
              ><i class="fa-solid fa-circle-exclamation"></i> If you want buy a
              bouquet, Press on it :</span
            >
          </div>
          <button id="shopBtn">
            <i class="fa-solid fa-cart-shopping"></i> Shop Now
          </button>
        </div>
        <img class="icon" src="images/flower-icon-2.png" alt="flower" />
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
